<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c2333"/>
      <stop offset="1" stop-color="#141926"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3d71e8"/>
      <stop offset="1" stop-color="#6b8ff0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#3d71e8" stroke-width="1.5"/>

  <!-- Left vertical nav rail -->
  <rect x="17" y="18" width="5" height="64" rx="2.5" fill="url(#accent)"/>

  <!-- Nav item 1 — active (full color) -->
  <rect x="27" y="20" width="38" height="9" rx="4" fill="url(#accent)"/>
  <!-- active dot -->
  <circle cx="19.5" cy="24.5" r="3" fill="#ffffff"/>

  <!-- Nav item 2 -->
  <rect x="27" y="35" width="28" height="7" rx="3.5" fill="#3d71e8" opacity="0.45"/>

  <!-- Nav item 3 — sub-item indented -->
  <rect x="33" y="47" width="22" height="6" rx="3" fill="#3d71e8" opacity="0.3"/>

  <!-- Nav item 4 — sub-item indented -->
  <rect x="33" y="57" width="26" height="6" rx="3" fill="#3d71e8" opacity="0.3"/>

  <!-- Nav item 5 -->
  <rect x="27" y="68" width="32" height="7" rx="3.5" fill="#3d71e8" opacity="0.45"/>

  <!-- Chevron arrow right -->
  <polyline points="72,42 80,50 72,58" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
